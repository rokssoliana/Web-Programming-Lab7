<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Онлайн тест</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Тест з веб-програмування</h1>
</header>

<main class="container">

    <!-- Номери питань -->
    <aside class="question-numbers" id="questionNumbers">
        <h3>Питання</h3>
        <div id="numbers"></div>
    </aside>

    <!-- Блок питання -->
    <section class="test-block">

        <div class="question-area">
            <h2 id="questionText">Завантаження питання...</h2>
        </div>

        <div id="answers" class="answers"></div>

        <div class="buttons">
            <button id="nextBtn">Наступне питання</button>
            <button id="finishBtn" style="display:none;">Завершити тест</button>
        </div>

    </section>

</main>

<!-- Результат -->
<section class="result" id="result"></section>

<div style="text-align:center; margin-bottom:40px;">
    <button id="restartBtn" style="display:none;">Пройти тест ще раз</button>
</div>

<script src="js/script.js"></script>

</body>
</html>
