<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Графічний редактор — Лабораторна робота</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Редактор</h2>
                <button id="theme-toggle">🌓 Тема</button>
            </div>
            
            <section class="control-group">
                <h3>Історія</h3>
                <div class="button-grid">
                    <button id="btn-undo" title="Назад">←</button>
                    <button id="btn-redo" title="Вперед">→</button>
                </div>
            </section>

            <section class="control-group">
                <h3>Режим</h3>
                <div class="mode-toggle">
                    <button id="btn-raster" class="active">Растр</button>
                    <button id="btn-vector">Вектор</button>
                </div>
            </section>

            <section class="control-group">
                <h3>Інструменти</h3>
                <div class="palette-wrapper">
                    <div class="mini-palette">
                        <div class="preset active-preset" style="background: #000000;" data-color="#000000"></div>
                        <div class="preset" style="background: #ef4444;" data-color="#ef4444"></div>
                        <div class="preset" style="background: #22c55e;" data-color="#22c55e"></div>
                        <div class="preset" style="background: #3b82f6;" data-color="#3b82f6"></div>
                    </div>
                    <input type="color" id="colorPicker" value="#3b82f6">
                </div>
                
                <div class="tool-row">
                    <label>Розмір: <span id="sizeValue">5</span></label>
                    <input type="range" id="lineWidth" min="1" max="100" value="5">
                </div>
                
                <div class="vertical-buttons">
                    <button id="btn-brush" class="active">Пензель</button>
                    <button id="btn-eraser">Ластик</button>
                    <button id="btn-clear" class="danger">Очистити</button>
                    <button id="btn-save">Зберегти PNG</button>
                </div>
            </section>

            <section id="vector-tools" class="control-group hidden">
                <h3>Фігури</h3>
                <div class="vertical-buttons">
                    <button id="add-rect">Прямокутник</button>
                    <button id="add-circle">Коло</button>
                    <button id="delete-shape" class="danger">Видалити фігуру</button>
                </div>
            </section>
        </aside>

        <main class="drawing-area">
            <div class="canvas-container">
                <div class="grid-layer" id="main-grid"></div>
                <canvas id="canvas" width="800" height="600"></canvas>
                <svg id="svg-canvas" width="800" height="600" class="hidden"></svg>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
